name: Keep Backend Alive

on:
  schedule:
    # Runs every 10 minutes to prevent Render's 15-minute sleep
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: curl -sSf https://tulasi-ai-hycl.onrender.com/api/health || echo "Failed to ping backend"
